name: validate skills

on:
  pull_request:
    branches:
      - '**'
    paths:
      - 'skills/**'
      - 'README.md'
      - 'AGENTS.md'
      - '.github/AGENTS.md'
      - '.github/workflows/validate-skills.yml'
  push:
    branches:
      - 'main'
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'
      - '*.*.*'
      - '*.*.*-*'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install skills-ref
        run: python -m pip install --upgrade pip skills-ref

      - name: Validate public skill
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v skills-ref >/dev/null 2>&1 && command -v agentskills >/dev/null 2>&1; then
            printf '#!/usr/bin/env bash\nexec agentskills "$@"\n' > "$RUNNER_TEMP/skills-ref"
            chmod +x "$RUNNER_TEMP/skills-ref"
            export PATH="$RUNNER_TEMP:$PATH"
          fi
          skills-ref validate skills/vgs-collect-android-guide
